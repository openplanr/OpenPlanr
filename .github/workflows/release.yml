name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      # When changesets exist: creates a "Version Packages" PR
      # When no changesets: checks if current version has a release, creates one if not
      - name: Create Release PR
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create GitHub Release
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          # Check if release already exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          # Extract latest changelog section (escape dots for regex safety)
          ESCAPED=$(echo "$VERSION" | sed 's/\./\\./g')
          NOTES=$(awk "/^## ${ESCAPED}/{found=1; next} /^## [0-9]/{if(found) exit} found" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --target main
